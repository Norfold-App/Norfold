name: Norfold build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: Web prototype
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: apps/web
        run: npm install

      - name: Build web prototype
        working-directory: apps/web
        run: npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v6
        with:
          name: norfold-web-preview
          path: apps/web/dist

  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android unit tests
        run: ./gradlew :apps:android:testDebugUnitTest

      - name: Run Android lint
        run: ./gradlew :apps:android:lintDebug

      - name: Build Android debug APK
        run: ./gradlew :apps:android:assembleDebug :apps:android:bundleRelease

      - name: Upload Android APK
        uses: actions/upload-artifact@v6
        with:
          name: norfold-android-builds
          path: |
            apps/android/build/outputs/apk/debug/*.apk
            apps/android/build/outputs/bundle/release/*.aab
