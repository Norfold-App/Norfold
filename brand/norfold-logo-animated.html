<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Norfold — animated logo source</title>
<!--
  Canonical Norfold logo-animation source (successor to notes_nync_v4_adaptive.html).

  The glyph is the EXACT vector trace of brand/norfold-glyph.png (potrace,
  99.8% pixel match) — see brand/norfold-glyph.svg for the standalone asset.
  Animation: the filled outline is revealed by three round-cap mask strokes
  (left stem → diagonal → i-stem), then the green dot pops and the wordmark
  rises. Because it's a reveal mask over one true path, it renders identically
  to the raster logo on any background — no cut-colour matching needed.

  Reveal capsule geometry (1688 viewBox), verified to cover 100% of glyph px:
    left stem : (384,540)-(384,1340)  w500
    diagonal  : (400,480)-(1150,1290) w460
    i stem    : (1165,810)-(1178,1340) w360
  Dot: circle (1159,436) r131 #56AA5F.
  Splash/launcher geometry should derive from these positions (AGENTS.md rule).

  Edit knobs: CSS custom properties + the timing block below.
  Click anywhere to replay. Honors prefers-reduced-motion.
-->
<style>
  :root{
    color-scheme: light dark;
    --bg:#f7f6f2;
    --ink:#1e2024;          /* glyph colour, from brand raster */
    --dot:#56aa5f;          /* Norfold green */
    --word:#1e2024;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#070a12; --ink:#f4f4f6; --word:#f4f4f6; }
  }
  html,body{height:100%}
  body{
    margin:0; display:grid; place-items:center;
    background:var(--bg);
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  .lockup{display:flex; align-items:center; gap:26px; user-select:none; cursor:pointer}
  .glyph{width:118px; height:118px; display:block}
  .ink{fill:var(--ink)}

  /* --- timing --- */
  .reveal{stroke:#fff; fill:none; stroke-linecap:round;
          stroke-dasharray:100; stroke-dashoffset:100;
          animation:draw .55s cubic-bezier(.55,.06,.28,1) forwards}
  #r-stem{animation-delay:0s}
  #r-diag{animation-delay:.28s; animation-duration:.62s}
  #r-i   {animation-delay:.92s; animation-duration:.4s}
  .dot{fill:var(--dot); transform-box:fill-box; transform-origin:center;
       transform:scale(0);
       animation:pop .42s cubic-bezier(.34,1.56,.64,1) forwards 1.2s}
  .word{
    font-size:64px; font-weight:800; letter-spacing:-.02em; color:var(--word);
    opacity:0; transform:translateY(10px);
    animation:rise .5s cubic-bezier(.22,1,.36,1) forwards 1.34s;
  }
  .word .accent{color:var(--dot)}

  /* gentle idle pulse on the dot once the intro is done */
  .idle .dot{animation:pop 0s forwards, pulse 3.2s ease-in-out 2.2s infinite}

  @keyframes draw {to{stroke-dashoffset:0}}
  @keyframes pop  {to{transform:scale(1)}}
  @keyframes rise {to{opacity:1; transform:translateY(0)}}
  @keyframes pulse{0%,100%{transform:scale(1)} 50%{transform:scale(1.12)}}

  @media (prefers-reduced-motion: reduce){
    .reveal{animation:none; stroke-dashoffset:0}
    .dot,.word{animation:none; opacity:1; transform:none}
  }
</style>
</head>
<body>
  <div class="lockup" id="lockup" title="Click to replay">

      <circle class="dot" cx="1159" cy="436" r="131"/>
    </svg>
    <div class="word">Norfold<span class="accent">.</span></div>
  </div>
<script>
  // replay on click; .idle enables the soft dot pulse after the intro
  const lockup = document.getElementById('lockup');
  const arm = el => {
    setTimeout(() => el.classList.add('idle'), 2000);
    el.addEventListener('click', () => {
      const clone = el.cloneNode(true);
      el.replaceWith(clone);
      arm(clone);
    });
  };
  arm(lockup);
</script>
</body>
</html>
